<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        margin: 0;
        padding: 14px;
        color: #1f2937;
      }

      .contenedor {
        max-width: 460px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      }

      h2 {
        margin: 0 0 14px 0;
        text-align: center;
        font-size: 24px;
        color: #111827;
      }

      .video-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 14px;
      }

      #video {
        width: 100%;
        max-width: 360px;
        border-radius: 14px;
        background: #000;
      }

      #canvas {
        display: none;
      }

      #estado {
        margin-top: 4px;
        font-size: 18px;
        font-weight: bold;
        padding: 12px;
        border-radius: 12px;
        text-align: center;
      }

      #nombreGrande {
        margin-top: 14px;
        font-size: 28px;
        font-weight: bold;
        text-align: center;
        line-height: 1.2;
        min-height: 68px;
        word-break: break-word;
        color: #111827;
      }

      .panel {
        margin-top: 14px;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 14px;
      }

      .panel-titulo {
        font-size: 14px;
        font-weight: bold;
        color: #374151;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      .fila {
        display: grid;
        grid-template-columns: 90px 1fr;
        gap: 8px;
        align-items: start;
        margin-bottom: 10px;
      }

      .fila:last-child {
        margin-bottom: 0;
      }

      .etiqueta {
        font-weight: bold;
        color: #374151;
        font-size: 14px;
      }

      .valor {
        font-size: 14px;
        color: #111827;
        word-break: break-word;
        white-space: pre-line;
      }

      #resultado {
        min-height: 74px;
      }

      #contenidoQR {
        max-height: 120px;
        overflow-y: auto;
        padding: 10px;
        border-radius: 10px;
        background: #ffffff;
        border: 1px solid #d1d5db;
        font-size: 13px;
        line-height: 1.35;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .botones {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 12px 10px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
      }

      .btn-principal {
        background: #1a73e8;
        color: white;
      }

      .btn-secundario {
        background: #e5e7eb;
        color: #111827;
      }

      .ok-bg {
        background: #d1fae5;
        color: #065f46;
      }

      .error-bg {
        background: #fee2e2;
        color: #991b1b;
      }

      .info-bg {
        background: #dbeafe;
        color: #1e40af;
      }

      @media (max-width: 430px) {
        h2 {
          font-size: 21px;
        }

        #nombreGrande {
          font-size: 24px;
        }

        .fila {
          grid-template-columns: 78px 1fr;
        }

        .botones {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="contenedor">
      <h2>Control de asistencia QR</h2>

      <div class="video-wrap">
        <video id="video" autoplay playsinline muted></video>
      </div>
      <canvas id="canvas"></canvas>

      <div id="estado" class="info-bg">Toca “Activar cámara”</div>

      <div id="nombreGrande"></div>

      <div class="panel">
        <div class="panel-titulo">Resultado del registro</div>

        <div class="fila">
          <div class="etiqueta">ID</div>
          <div class="valor" id="idValor">—</div>
        </div>

        <div class="fila">
          <div class="etiqueta">Nombre</div>
          <div class="valor" id="nombreValor">—</div>
        </div>

        <div class="fila">
          <div class="etiqueta">Estado</div>
          <div class="valor" id="resultado">Esperando lectura...</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-titulo">Contenido completo del QR</div>
        <div id="contenidoQR">Sin lectura todavía.</div>
      </div>

      <div class="botones">
        <button class="btn-principal" type="button" onclick="iniciarCamara()">Activar cámara</button>
        <button class="btn-principal" type="button" onclick="reiniciarEscaneo()">Reiniciar</button>
        <button class="btn-secundario" type="button" onclick="detenerCamara()">Detener</button>
      </div>
    </div>

    <iframe name="frameOculto" style="display:none;"></iframe>

    <form id="formEnvio" method="POST" target="frameOculto" style="display:none;">
      <input type="hidden" name="valor" id="valorInput">
      <input type="hidden" name="correo" id="correoInput">
    </form>

    <script>
      const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxnwoU0O3MJVXTl1wQtuc2501maRUe3r56uR_fRox1oXDHkDdPFsYS8PONAp4FWdwBmtA/exec';

      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      const estado = document.getElementById('estado');
      const nombreGrande = document.getElementById('nombreGrande');
      const idValor = document.getElementById('idValor');
      const nombreValor = document.getElementById('nombreValor');
      const resultado = document.getElementById('resultado');
      const contenidoQR = document.getElementById('contenidoQR');

      const formEnvio = document.getElementById('formEnvio');
      const valorInput = document.getElementById('valorInput');
      const correoInput = document.getElementById('correoInput');

      formEnvio.action = WEBAPP_URL;

      let streamActual = null;
      let escaneando = false;
      let procesando = false;
      let ultimoCodigo = '';
      let ultimoTiempoLectura = 0;

      function setEstado(texto, tipo) {
        estado.textContent = texto;
        estado.className = '';

        if (tipo === 'ok') {
          estado.classList.add('ok-bg');
        } else if (tipo === 'error') {
          estado.classList.add('error-bg');
        } else {
          estado.classList.add('info-bg');
        }
      }

      function beepOk() {
        try {
          const audio = new Audio('https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg');
          audio.play();
        } catch (e) {}
      }

      function beepError() {
        try {
          const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
          audio.play();
        } catch (e) {}
      }

      function vibrar(tipo) {
        if (!navigator.vibrate) return;
        if (tipo === 'ok') {
          navigator.vibrate([120, 60, 120]);
        } else {
          navigator.vibrate([200, 80, 200]);
        }
      }

      function limpiarPanel() {
        nombreGrande.textContent = '';
        idValor.textContent = '—';
        nombreValor.textContent = '—';
        resultado.textContent = 'Esperando lectura...';
        contenidoQR.textContent = 'Sin lectura todavía.';
      }

      function enviarQRAlServidor(valor) {
        valorInput.value = valor;
        correoInput.value = '';
        formEnvio.submit();
      }

      async function iniciarCamara() {
        detenerCamara();
        limpiarPanel();
        setEstado('Solicitando acceso a la cámara...', 'info');

        try {
          if (!window.isSecureContext) {
            throw new Error('La página no está en contexto seguro HTTPS.');
          }

          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error('Este navegador no soporta getUserMedia().');
          }

          streamActual = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: 'environment' },
              width: { ideal: 1280 },
              height: { ideal: 720 }
            },
            audio: false
          });

          video.srcObject = streamActual;
          await video.play();

          escaneando = true;
          procesando = false;

          setEstado('Apunta la cámara al código QR', 'info');
          resultado.textContent = 'Escaneo continuo activo...';

          requestAnimationFrame(leerFrame);
        } catch (error) {
          setEstado('No se pudo abrir la cámara', 'error');
          resultado.textContent = error && error.message ? error.message : String(error);
          beepError();
          vibrar('error');
        }
      }

      function leerFrame() {
        if (!escaneando || procesando) return;

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: 'dontInvert'
          });

          if (code && code.data) {
            const ahora = Date.now();
            const contenido = String(code.data).trim();

            if (contenido === ultimoCodigo && (ahora - ultimoTiempoLectura) < 3000) {
              requestAnimationFrame(leerFrame);
              return;
            }

            ultimoCodigo = contenido;
            ultimoTiempoLectura = ahora;
            procesando = true;
            escaneando = false;

            setEstado('QR detectado, enviando...', 'info');
            contenidoQR.textContent = contenido;

            const nombreMatch = contenido.match(/[?&]nombre=([^&#]+)/i);
            const idMatch = contenido.match(/[?&]id=([^&#]+)/i);

            const nombre = nombreMatch ? decodeURIComponent(nombreMatch[1]) : '';
            const id = idMatch ? decodeURIComponent(idMatch[1]) : '';

            idValor.textContent = id || '—';
            nombreValor.textContent = nombre || '—';
            nombreGrande.textContent = nombre || '';
            resultado.textContent = 'Enviando al servidor...';

            enviarQRAlServidor(contenido);

            setTimeout(function() {
              setEstado('Enviado correctamente', 'ok');
              resultado.textContent = 'Se envió al Web App. Revisa Asistencia, LecturasQR y Logs.';
              beepOk();
              vibrar('ok');

              procesando = false;
              escaneando = true;
              requestAnimationFrame(leerFrame);
            }, 1800);

            return;
          }
        }

        requestAnimationFrame(leerFrame);
      }

      function detenerCamara() {
        escaneando = false;

        if (streamActual) {
          streamActual.getTracks().forEach(function(track) {
            track.stop();
          });
          streamActual = null;
        }

        video.srcObject = null;
        setEstado('Cámara detenida', 'info');
      }

      function reiniciarEscaneo() {
        ultimoCodigo = '';
        ultimoTiempoLectura = 0;
        procesando = false;
        limpiarPanel();
        setEstado('Reiniciando...', 'info');
        iniciarCamara();
      }

      window.onbeforeunload = function() {
        detenerCamara();
      };
    </script>
  </body>
</html>
