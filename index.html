<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        margin: 0;
        padding: 14px;
        color: #1f2937;
      }

      .contenedor {
        max-width: 480px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      }

      h2 {
        margin: 0 0 14px 0;
        text-align: center;
        font-size: 24px;
        color: #111827;
      }

      .panel {
        margin-top: 14px;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 14px;
      }

      .panel-titulo {
        font-size: 14px;
        font-weight: bold;
        color: #374151;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      .panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }

      .panel-header .panel-titulo {
        margin-bottom: 0;
      }

      .controles {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      select {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 12px;
        font-size: 14px;
        background: #fff;
      }

      .acciones-camara {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }

      .video-wrap {
        position: relative;
        width: 100%;
        max-width: 380px;
        margin: 14px auto 0 auto;
        border-radius: 16px;
        overflow: hidden;
        background: #000;
      }

      #video {
        display: block;
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        background: #000;
      }

      #overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .guia-central {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 62%;
        height: 62%;
        transform: translate(-50%, -50%);
        border: 3px solid rgba(255,255,255,0.9);
        border-radius: 16px;
        box-shadow: 0 0 0 9999px rgba(0,0,0,0.18);
        pointer-events: none;
      }

      #canvas {
        display: none;
      }

      #estado {
        margin-top: 14px;
        font-size: 18px;
        font-weight: bold;
        padding: 12px;
        border-radius: 12px;
        text-align: center;
      }

      #contenidoQR {
        max-height: 120px;
        overflow-y: auto;
        padding: 10px;
        border-radius: 10px;
        background: #ffffff;
        border: 1px solid #d1d5db;
        font-size: 13px;
        line-height: 1.35;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .oculto {
        display: none;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 12px 10px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
      }

      .btn-principal {
        background: #1a73e8;
        color: white;
      }

      .btn-secundario {
        background: #e5e7eb;
        color: #111827;
      }

      .btn-icono {
        background: #e5e7eb;
        border: none;
        border-radius: 10px;
        padding: 8px 10px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s ease, transform 0.2s ease;
      }

      .btn-icono:hover {
        background: #d1d5db;
      }

      .btn-icono:active {
        transform: scale(0.96);
      }

      .btn-icono svg {
        width: 20px;
        height: 20px;
        stroke: #111827;
      }

      .ok-bg {
        background: #d1fae5;
        color: #065f46;
      }

      .error-bg {
        background: #fee2e2;
        color: #991b1b;
      }

      .info-bg {
        background: #dbeafe;
        color: #1e40af;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.25s ease, visibility 0.25s ease;
        padding: 16px;
      }

      .modal.mostrar {
        opacity: 1;
        visibility: visible;
      }

      .modal-contenido {
        background: #ffffff;
        padding: 22px 18px;
        border-radius: 18px;
        text-align: center;
        width: 100%;
        max-width: 340px;
        box-shadow: 0 14px 38px rgba(0,0,0,0.22);
        transform: scale(0.92);
        opacity: 0;
        transition: transform 0.25s ease, opacity 0.25s ease, border-top-color 0.2s ease;
        border-top: 8px solid #2563eb;
      }

      .modal.mostrar .modal-contenido {
        transform: scale(1);
        opacity: 1;
      }

      .modal-ok .modal-contenido {
        border-top-color: #16a34a;
      }

      .modal-ok #modalEstado {
        color: #166534;
      }

      .modal-error .modal-contenido {
        border-top-color: #dc2626;
      }

      .modal-error #modalEstado {
        color: #991b1b;
      }

      .modal-info .modal-contenido {
        border-top-color: #2563eb;
      }

      .modal-info #modalEstado {
        color: #1d4ed8;
      }

      .modal-emoji {
        font-size: 34px;
        line-height: 1;
        margin-bottom: 8px;
      }

      #modalEstado {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 6px;
      }

      .modal-nombre {
        font-size: 24px;
        font-weight: bold;
        margin-top: 8px;
        color: #111827;
        line-height: 1.15;
        word-break: break-word;
      }

      .modal-matricula {
        font-size: 14px;
        color: #6b7280;
        margin-top: 8px;
      }

      @media (max-width: 430px) {
        h2 {
          font-size: 21px;
        }

        .fila {
          grid-template-columns: 78px 1fr;
        }

        .acciones-camara {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="contenedor">
      <h2>Control de asistencia QR</h2>

      <div class="panel">
        <div class="panel-titulo">Cámara</div>
        <div class="controles">
          <select id="cameraSelect">
            <option value="">Cargando cámaras...</option>
          </select>

          <div class="acciones-camara">
            <button class="btn-principal" type="button" onclick="aplicarCamaraSeleccionada()">Activar cámara</button>
            <button class="btn-principal" type="button" onclick="reiniciarEscaneo()">Reiniciar</button>
            <button class="btn-secundario" type="button" onclick="detenerCamara()">Detener</button>
          </div>
        </div>
      </div>

      <div class="video-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div class="guia-central"></div>
      </div>

      <canvas id="canvas"></canvas>

      <div id="estado" class="info-bg">Selecciona una cámara y activa el escaneo</div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-titulo">Contenido completo del QR</div>
          <button
            class="btn-icono"
            type="button"
            onclick="toggleQR()"
            id="btnToggleQR"
            aria-label="Mostrar contenido del QR"
            title="Mostrar contenido del QR"
          >
            <svg id="iconoQR" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <div id="contenidoQR" class="oculto">Sin lectura todavía.</div>
      </div>
    </div>

    <div id="modalRegistro" class="modal modal-info">
      <div class="modal-contenido">
        <div id="modalEmoji" class="modal-emoji">ℹ️</div>
        <div id="modalEstado">Registro</div>
        <div id="modalNombre" class="modal-nombre"></div>
        <div id="modalMatricula" class="modal-matricula"></div>
      </div>
    </div>

    <iframe id="frameRegistroGet" name="frameRegistroGet" style="display:none;"></iframe>

    <script>
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      const overlay = document.getElementById('overlay');
      const overlayCtx = overlay.getContext('2d');

      const estado = document.getElementById('estado');
      const contenidoQR = document.getElementById('contenidoQR');
      const cameraSelect = document.getElementById('cameraSelect');

      let streamActual = null;
      let escaneando = false;
      let procesando = false;
      let ultimoCodigo = '';
      let ultimoTiempoLectura = 0;
      let camaraSeleccionadaId = '';

      let bloqueoRegistro = false;
      let ultimoRegistroEnviado = '';
      let ultimoRegistroTiempo = 0;

      let modalAbierto = false;
      let temporizadorModal = null;

      const BLOQUEO_MS = 8000;

      function setEstado(texto, tipo) {
        estado.textContent = texto;
        estado.className = '';

        if (tipo === 'ok') estado.classList.add('ok-bg');
        else if (tipo === 'error') estado.classList.add('error-bg');
        else estado.classList.add('info-bg');
      }

      function beepOk() {
        try {
          const audio = new Audio('https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg');
          audio.play();
        } catch (e) {}
      }

      function beepError() {
        try {
          const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
          audio.play();
        } catch (e) {}
      }

      function vibrar(tipo) {
        if (!navigator.vibrate) return;
        if (tipo === 'ok') navigator.vibrate([120, 60, 120]);
        else navigator.vibrate([200, 80, 200]);
      }

      function limpiarPanel() {
        contenidoQR.textContent = 'Sin lectura todavía.';
      }

      function limpiarOverlay() {
        overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
      }

      function ajustarOverlay() {
        const rect = video.getBoundingClientRect();
        overlay.width = rect.width;
        overlay.height = rect.height;
        limpiarOverlay();
      }

      function dibujarLinea(inicio, fin, color, ancho) {
        overlayCtx.beginPath();
        overlayCtx.moveTo(inicio.x, inicio.y);
        overlayCtx.lineTo(fin.x, fin.y);
        overlayCtx.lineWidth = ancho;
        overlayCtx.strokeStyle = color;
        overlayCtx.stroke();
      }

      function dibujarMarcoQR(location) {
        limpiarOverlay();
        if (!location) return;

        const sx = overlay.width / canvas.width;
        const sy = overlay.height / canvas.height;

        const topLeft = { x: location.topLeftCorner.x * sx, y: location.topLeftCorner.y * sy };
        const topRight = { x: location.topRightCorner.x * sx, y: location.topRightCorner.y * sy };
        const bottomRight = { x: location.bottomRightCorner.x * sx, y: location.bottomRightCorner.y * sy };
        const bottomLeft = { x: location.bottomLeftCorner.x * sx, y: location.bottomLeftCorner.y * sy };

        dibujarLinea(topLeft, topRight, '#22c55e', 4);
        dibujarLinea(topRight, bottomRight, '#22c55e', 4);
        dibujarLinea(bottomRight, bottomLeft, '#22c55e', 4);
        dibujarLinea(bottomLeft, topLeft, '#22c55e', 4);
      }

      function registrarPorGetOculto(url) {
        const frame = document.getElementById('frameRegistroGet');
        frame.src = 'about:blank';

        setTimeout(function() {
          frame.src = url;
        }, 100);
      }

      function extraerDatosQR(contenido) {
        let nombre = '';
        let matricula = '';

        try {
          const url = new URL(contenido);
          nombre = url.searchParams.get('nombre') || '';
          matricula = url.searchParams.get('matricula') || url.searchParams.get('id') || '';
        } catch (e) {
          const nombreMatch = contenido.match(/[?&]nombre=([^&#]+)/i);
          const matriculaMatch = contenido.match(/[?&](?:matricula|id)=([^&#]+)/i);

          nombre = nombreMatch ? decodeURIComponent(nombreMatch[1]) : '';
          matricula = matriculaMatch ? decodeURIComponent(matriculaMatch[1]) : '';
        }

        return {
          nombre: nombre.trim(),
          matricula: matricula.trim()
        };
      }

      function yaSeEnvioReciente(contenido) {
        const ahora = Date.now();
        return (
          ultimoRegistroEnviado === contenido &&
          (ahora - ultimoRegistroTiempo) < BLOQUEO_MS
        );
      }

      function marcarEnvio(contenido) {
        ultimoRegistroEnviado = contenido;
        ultimoRegistroTiempo = Date.now();
      }

      function toggleQR() {
        const oculto = contenidoQR.classList.toggle('oculto');
        const btn = document.getElementById('btnToggleQR');
        const icono = document.getElementById('iconoQR');

        if (oculto) {
          btn.setAttribute('aria-label', 'Mostrar contenido del QR');
          btn.setAttribute('title', 'Mostrar contenido del QR');
          icono.innerHTML = `
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          `;
        } else {
          btn.setAttribute('aria-label', 'Ocultar contenido del QR');
          btn.setAttribute('title', 'Ocultar contenido del QR');
          icono.innerHTML = `
            <path d="M3 3l18 18"></path>
            <path d="M10.58 10.58A2 2 0 0 0 10 12a2 2 0 0 0 2 2c.52 0 .99-.2 1.34-.54"></path>
            <path d="M9.88 5.09A10.94 10.94 0 0 1 12 5c6.5 0 10 7 10 7a17.6 17.6 0 0 1-3.04 4.19"></path>
            <path d="M6.61 6.61C4.62 7.9 3.3 10.1 2 12c0 0 3.5 7 10 7 1.73 0 3.24-.5 4.56-1.25"></path>
          `;
        }
      }

      function mostrarModal(nombre, matricula, estadoTexto, tipo) {
        const modal = document.getElementById('modalRegistro');
        const modalNombre = document.getElementById('modalNombre');
        const modalMatricula = document.getElementById('modalMatricula');
        const modalEstado = document.getElementById('modalEstado');
        const modalEmoji = document.getElementById('modalEmoji');

        modal.classList.remove('modal-ok', 'modal-error', 'modal-info');
        modal.classList.add(tipo === 'ok' ? 'modal-ok' : tipo === 'error' ? 'modal-error' : 'modal-info');

        modalEstado.textContent = estadoTexto || 'Registro';
        modalNombre.textContent = nombre || '';
        modalMatricula.textContent = matricula ? 'Matrícula: ' + matricula : '';

        if (tipo === 'ok') modalEmoji.textContent = '✅';
        else if (tipo === 'error') modalEmoji.textContent = '❌';
        else modalEmoji.textContent = 'ℹ️';

        modal.classList.add('mostrar');
        modalAbierto = true;

        if (temporizadorModal) clearTimeout(temporizadorModal);

        temporizadorModal = setTimeout(function() {
          cerrarModal();
        }, 4000);
      }

      function cerrarModal() {
        const modal = document.getElementById('modalRegistro');
        modal.classList.remove('mostrar');

        setTimeout(function() {
          modalAbierto = false;
          escaneando = true;
          procesando = false;
          bloqueoRegistro = false;
          limpiarOverlay();
          requestAnimationFrame(leerFrame);
        }, 250);
      }

      async function cargarCamaras() {
        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
            cameraSelect.innerHTML = '<option value="">Tu navegador no soporta cámaras</option>';
            return;
          }

          const devices = await navigator.mediaDevices.enumerateDevices();
          const cameras = devices.filter(device => device.kind === 'videoinput');

          cameraSelect.innerHTML = '';

          if (!cameras.length) {
            cameraSelect.innerHTML = '<option value="">No se encontraron cámaras</option>';
            return;
          }

          cameras.forEach((camera, index) => {
            const option = document.createElement('option');
            option.value = camera.deviceId;
            option.textContent = camera.label || ('Cámara ' + (index + 1));
            cameraSelect.appendChild(option);
          });

          const preferida = cameras.find(cam => /back|rear|trasera|environment/i.test(cam.label || ''));
          camaraSeleccionadaId = preferida ? preferida.deviceId : cameras[0].deviceId;
          cameraSelect.value = camaraSeleccionadaId;
        } catch (error) {
          cameraSelect.innerHTML = '<option value="">Error cargando cámaras</option>';
        }
      }

      async function aplicarCamaraSeleccionada() {
        camaraSeleccionadaId = cameraSelect.value || '';
        await iniciarCamara();
      }

      async function iniciarCamara() {
        detenerCamara(false);
        limpiarPanel();
        setEstado('Solicitando acceso a la cámara...', 'info');

        try {
          if (!window.isSecureContext) {
            throw new Error('La página no está en contexto seguro HTTPS.');
          }

          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error('Este navegador no soporta getUserMedia().');
          }

          const constraints = camaraSeleccionadaId
            ? {
                video: {
                  deviceId: { exact: camaraSeleccionadaId },
                  width: { ideal: 1280 },
                  height: { ideal: 1280 }
                },
                audio: false
              }
            : {
                video: {
                  facingMode: { ideal: 'environment' },
                  width: { ideal: 1280 },
                  height: { ideal: 1280 }
                },
                audio: false
              };

          streamActual = await navigator.mediaDevices.getUserMedia(constraints);

          video.srcObject = streamActual;
          await video.play();

          ajustarOverlay();
          await cargarCamaras();

          escaneando = true;
          procesando = false;

          setEstado('Apunta el QR dentro del recuadro', 'info');
          requestAnimationFrame(leerFrame);
        } catch (error) {
          setEstado('No se pudo abrir la cámara', 'error');
          beepError();
          vibrar('error');
          mostrarModal('Error al abrir cámara', '', error && error.message ? error.message : 'No se pudo acceder a la cámara.', 'error');
        }
      }

      function leerFrame() {
        if (!escaneando || procesando || bloqueoRegistro || modalAbierto) return;

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;

          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: 'dontInvert'
          });

          if (code && code.data) {
            dibujarMarcoQR(code.location);

            const ahora = Date.now();
            const contenido = String(code.data).trim();

            if (contenido === ultimoCodigo && (ahora - ultimoTiempoLectura) < BLOQUEO_MS) {
              requestAnimationFrame(leerFrame);
              return;
            }

            if (yaSeEnvioReciente(contenido)) {
              requestAnimationFrame(leerFrame);
              return;
            }

            ultimoCodigo = contenido;
            ultimoTiempoLectura = ahora;
            procesando = true;
            escaneando = false;
            bloqueoRegistro = true;

            setEstado('QR detectado, procesando...', 'info');
            contenidoQR.textContent = contenido;

            const datos = extraerDatosQR(contenido);

            if (!/^https?:\/\//i.test(contenido)) {
              setEstado('QR inválido', 'error');
              beepError();
              vibrar('error');
              mostrarModal(datos.nombre || 'Código no válido', datos.matricula || '', 'El QR debe contener una URL completa.', 'error');
              return;
            }

            if (!datos.matricula || !datos.nombre) {
              setEstado('QR incompleto', 'error');
              beepError();
              vibrar('error');
              mostrarModal(datos.nombre || 'Datos incompletos', datos.matricula || '', 'La URL debe incluir matrícula y nombre.', 'error');
              return;
            }

            marcarEnvio(contenido);
            setEstado('Enviando al Web App...', 'info');

            registrarPorGetOculto(contenido);

            setTimeout(function() {
              setEstado('Registro enviado correctamente', 'ok');
              beepOk();
              vibrar('ok');
              mostrarModal(datos.nombre, datos.matricula, 'Registro exitoso', 'ok');
            }, 1800);

            return;
          } else {
            limpiarOverlay();
          }
        }

        requestAnimationFrame(leerFrame);
      }

      function detenerCamara(mostrarMensaje = true) {
        escaneando = false;

        if (streamActual) {
          streamActual.getTracks().forEach(function(track) {
            track.stop();
          });
          streamActual = null;
        }

        video.srcObject = null;
        limpiarOverlay();

        if (mostrarMensaje) {
          setEstado('Cámara detenida', 'info');
        }
      }

      function reiniciarEscaneo() {
        ultimoCodigo = '';
        ultimoTiempoLectura = 0;
        ultimoRegistroEnviado = '';
        ultimoRegistroTiempo = 0;
        procesando = false;
        bloqueoRegistro = false;
        modalAbierto = false;

        const modal = document.getElementById('modalRegistro');
        modal.classList.remove('mostrar');

        if (temporizadorModal) {
          clearTimeout(temporizadorModal);
          temporizadorModal = null;
        }

        limpiarPanel();
        setEstado('Reiniciando...', 'info');
        aplicarCamaraSeleccionada();
      }

      window.addEventListener('resize', ajustarOverlay);

      window.onload = async function() {
        await cargarCamaras();
      };

      window.onbeforeunload = function() {
        detenerCamara(false);
      };
    </script>
  </body>
</html>
