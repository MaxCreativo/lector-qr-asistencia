<script>
  const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbye77YAlvnYpVee8qUQJXRr12hXTA_0EBX20613hpVnRUvefmZrt2doPcU-YOfBu6ZCMw/exec';

  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const estado = document.getElementById('estado');
  const resultado = document.getElementById('resultado');
  const formEnvio = document.getElementById('formEnvio');
  const valorInput = document.getElementById('valorInput');
  const correoInput = document.getElementById('correoInput');

  formEnvio.action = WEBAPP_URL;

  let streamActual = null;
  let escaneando = false;
  let procesando = false;
  let ultimoCodigo = '';
  let ultimoTiempoLectura = 0;

  function enviarQRAlServidor(valor) {
    valorInput.value = valor;
    correoInput.value = '';
    formEnvio.submit();
  }

  async function iniciarCamara() {
    detenerCamara();
    estado.className = '';
    resultado.className = '';
    estado.textContent = 'Solicitando acceso a la cámara...';
    resultado.textContent = '';

    try {
      streamActual = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' }
        },
        audio: false
      });

      video.srcObject = streamActual;
      await video.play();

      escaneando = true;
      procesando = false;
      estado.textContent = 'Apunta la cámara al código QR';

      requestAnimationFrame(leerFrame);
    } catch (error) {
      estado.textContent = 'No se pudo abrir la cámara';
      estado.className = 'error';
      resultado.textContent = error.message || String(error);
    }
  }

  function leerFrame() {
    if (!escaneando || procesando) return;

    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'dontInvert'
      });

      if (code && code.data) {
        const ahora = Date.now();

        if (code.data === ultimoCodigo && (ahora - ultimoTiempoLectura) < 3000) {
          requestAnimationFrame(leerFrame);
          return;
        }

        ultimoCodigo = code.data;
        ultimoTiempoLectura = ahora;
        procesando = true;
        escaneando = false;

        estado.textContent = 'QR detectado, enviando asistencia...';
        resultado.textContent = 'Contenido leído: ' + code.data;

        enviarQRAlServidor(code.data);

        setTimeout(function() {
          estado.textContent = 'Enviado. Revisa la hoja Asistencia y Logs.';
          estado.className = 'ok';
          detenerCamara();
        }, 1200);

        return;
      }
    }

    requestAnimationFrame(leerFrame);
  }

  function detenerCamara() {
    escaneando = false;

    if (streamActual) {
      streamActual.getTracks().forEach(function(track) {
        track.stop();
      });
      streamActual = null;
    }

    video.srcObject = null;
  }

  function reiniciarEscaneo() {
    ultimoCodigo = '';
    ultimoTiempoLectura = 0;
    procesando = false;
    iniciarCamara();
  }
</script>
