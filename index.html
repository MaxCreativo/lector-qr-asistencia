<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        margin: 0;
        padding: 16px;
        text-align: center;
      }

      .contenedor {
        max-width: 430px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      }

      h2 {
        margin: 0 0 12px 0;
        color: #333;
      }

      #video {
        width: 100%;
        max-width: 360px;
        border-radius: 14px;
        background: #000;
      }

      #canvas {
        display: none;
      }

      #estado {
        margin-top: 14px;
        font-size: 18px;
        font-weight: bold;
        padding: 12px;
        border-radius: 12px;
      }

      #resultado {
        margin-top: 12px;
        padding: 14px;
        border-radius: 12px;
        font-size: 15px;
        white-space: pre-line;
        word-break: break-word;
        min-height: 88px;
      }

      #nombreGrande {
        margin-top: 14px;
        font-size: 28px;
        font-weight: bold;
        min-height: 72px;
        white-space: normal;
        word-break: break-word;
      }

      .ok-bg {
        background: #d1fae5;
        color: #065f46;
      }

      .error-bg {
        background: #fee2e2;
        color: #991b1b;
      }

      .info-bg {
        background: #dbeafe;
        color: #1e40af;
      }

      .botones {
        display: flex;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 16px;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 15px;
        cursor: pointer;
      }

      .btn-principal {
        background: #1a73e8;
        color: white;
      }

      .btn-secundario {
        background: #e5e7eb;
        color: #111827;
      }
    </style>
  </head>
  <body>
    <div class="contenedor">
      <h2>Control de asistencia QR</h2>

      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>

      <div id="estado" class="info-bg">Toca “Activar cámara”</div>
      <div id="nombreGrande"></div>
      <div id="resultado">Esperando lectura...</div>

      <div class="botones">
        <button class="btn-principal" type="button" onclick="iniciarCamara()">Activar cámara</button>
        <button class="btn-principal" type="button" onclick="reiniciarEscaneo()">Reiniciar</button>
        <button class="btn-secundario" type="button" onclick="detenerCamara()">Detener</button>
      </div>
    </div>

    <iframe name="frameOculto" style="display:none;"></iframe>

    <script>
      // Reemplaza esta URL por tu /exec
      const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxf2L6xpkNAnRTOLCwY--Ja9xC0PQQqoKOUlJd9RRJ3at1juxO-Xt0YFVr2qDv06avptg/exec';

      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const estado = document.getElementById('estado');
      const resultado = document.getElementById('resultado');
      const nombreGrande = document.getElementById('nombreGrande');

      let streamActual = null;
      let escaneando = false;
      let procesando = false;
      let ultimoCodigo = '';
      let ultimoTiempoLectura = 0;

      function setEstado(texto, tipo) {
        estado.textContent = texto;
        estado.className = '';

        if (tipo === 'ok') estado.classList.add('ok-bg');
        else if (tipo === 'error') estado.classList.add('error-bg');
        else estado.classList.add('info-bg');
      }

      function beepOk() {
        try {
          const audio = new Audio('https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg');
          audio.play();
        } catch (e) {}
      }

      function beepError() {
        try {
          const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
          audio.play();
        } catch (e) {}
      }

      function vibrar(tipo) {
        if (!navigator.vibrate) return;
        if (tipo === 'ok') navigator.vibrate([120, 60, 120]);
        else navigator.vibrate([200, 80, 200]);
      }

      async function enviarQRAlServidor(valor) {
        const formData = new URLSearchParams();
        formData.append('valor', valor);
        formData.append('correo', '');

        const res = await fetch(WEBAPP_URL, {
          method: 'POST',
          body: formData
        });

        const texto = await res.text();

        try {
          return JSON.parse(texto);
        } catch (e) {
          throw new Error('Respuesta no válida del servidor: ' + texto.substring(0, 200));
        }
      }

      async function iniciarCamara() {
        detenerCamara();
        nombreGrande.textContent = '';
        resultado.textContent = 'Solicitando acceso a la cámara...';
        setEstado('Solicitando acceso a la cámara...', 'info');

        try {
          if (!window.isSecureContext) {
            throw new Error('La página no está en contexto seguro HTTPS.');
          }

          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error('Este navegador no soporta getUserMedia().');
          }

          streamActual = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: 'environment' },
              width: { ideal: 1280 },
              height: { ideal: 720 }
            },
            audio: false
          });

          video.srcObject = streamActual;
          await video.play();

          escaneando = true;
          procesando = false;
          setEstado('Apunta la cámara al código QR', 'info');
          resultado.textContent = 'Escaneo continuo activo...';

          requestAnimationFrame(leerFrame);
        } catch (error) {
          setEstado('No se pudo abrir la cámara', 'error');
          resultado.textContent = (error && error.message) ? error.message : String(error);
          beepError();
          vibrar('error');
        }
      }

      function leerFrame() {
        if (!escaneando || procesando) return;

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: 'dontInvert'
          });

          if (code && code.data) {
            const ahora = Date.now();
            const contenido = String(code.data).trim();

            if (contenido === ultimoCodigo && (ahora - ultimoTiempoLectura) < 3000) {
              requestAnimationFrame(leerFrame);
              return;
            }

            ultimoCodigo = contenido;
            ultimoTiempoLectura = ahora;
            procesando = true;
            escaneando = false;

            setEstado('QR detectado, registrando...', 'info');
            resultado.textContent = 'Contenido leído:\n' + contenido;

            enviarQRAlServidor(contenido)
              .then(function(res) {
                if (res && res.ok) {
                  const tipo = res.tipo || '';
                  const etiqueta = tipo ? ('\nTipo: ' + tipo) : '';

                  setEstado(res.mensaje || 'Registro correcto', 'ok');
                  nombreGrande.textContent = res.nombre || '';
                  resultado.textContent =
                    'ID: ' + (res.id || '') +
                    '\nNombre: ' + (res.nombre || '') +
                    etiqueta;

                  beepOk();
                  vibrar('ok');
                } else {
                  setEstado((res && res.mensaje) ? res.mensaje : 'No se pudo registrar', 'error');
                  nombreGrande.textContent = '';
                  resultado.textContent =
                    'Contenido leído:\n' + contenido +
                    '\n\nRespuesta:\n' + JSON.stringify(res);

                  beepError();
                  vibrar('error');
                }

                // escaneo continuo automático
                setTimeout(function() {
                  procesando = false;
                  escaneando = true;
                  setEstado('Listo para el siguiente escaneo', 'info');
                  requestAnimationFrame(leerFrame);
                }, 1800);
              })
              .catch(function(err) {
                setEstado('Error al guardar la lectura', 'error');
                nombreGrande.textContent = '';
                resultado.textContent = err && err.message ? err.message : String(err);

                beepError();
                vibrar('error');

                setTimeout(function() {
                  procesando = false;
                  escaneando = true;
                  setEstado('Listo para reintentar', 'info');
                  requestAnimationFrame(leerFrame);
                }, 2000);
              });

            return;
          }
        }

        requestAnimationFrame(leerFrame);
      }

      function detenerCamara() {
        escaneando = false;

        if (streamActual) {
          streamActual.getTracks().forEach(function(track) {
            track.stop();
          });
          streamActual = null;
        }

        video.srcObject = null;
      }

      function reiniciarEscaneo() {
        ultimoCodigo = '';
        ultimoTiempoLectura = 0;
        procesando = false;
        nombreGrande.textContent = '';
        resultado.textContent = 'Reiniciando...';
        iniciarCamara();
      }

      window.onbeforeunload = function() {
        detenerCamara();
      };
    </script>
  </body>
</html>
