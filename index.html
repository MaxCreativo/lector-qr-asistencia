<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
  </head>
  <body style="font-family:Arial,sans-serif;text-align:center;padding:16px;background:#f3f4f6;">
    <div style="max-width:430px;margin:0 auto;background:#fff;border-radius:18px;padding:16px;box-shadow:0 6px 20px rgba(0,0,0,.12);">
      <h2>Control de asistencia QR</h2>

      <video id="video" autoplay playsinline muted style="width:100%;max-width:360px;border-radius:14px;background:#000;"></video>
      <canvas id="canvas" style="display:none;"></canvas>

      <div id="estado" style="margin-top:14px;font-size:18px;font-weight:bold;padding:12px;border-radius:12px;background:#dbeafe;color:#1e40af;">
        Toca “Activar cámara”
      </div>

      <div id="nombreGrande" style="margin-top:14px;font-size:28px;font-weight:bold;min-height:72px;"></div>

      <div id="resultado" style="margin-top:12px;padding:14px;border-radius:12px;font-size:15px;white-space:pre-line;word-break:break-word;min-height:88px;background:#f9fafb;">
        Esperando lectura...
      </div>

      <div style="display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:16px;">
        <button type="button" onclick="iniciarCamara()" style="border:none;border-radius:10px;padding:12px 16px;font-size:15px;background:#1a73e8;color:#fff;">Activar cámara</button>
        <button type="button" onclick="reiniciarEscaneo()" style="border:none;border-radius:10px;padding:12px 16px;font-size:15px;background:#1a73e8;color:#fff;">Reiniciar</button>
        <button type="button" onclick="detenerCamara()" style="border:none;border-radius:10px;padding:12px 16px;font-size:15px;background:#e5e7eb;color:#111827;">Detener</button>
      </div>
    </div>

    <iframe name="frameOculto" style="display:none;"></iframe>

    <form id="formEnvio" method="POST" target="frameOculto" style="display:none;">
      <input type="hidden" name="valor" id="valorInput">
      <input type="hidden" name="correo" id="correoInput">
    </form>

    <script>
      const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxnwoU0O3MJVXTl1wQtuc2501maRUe3r56uR_fRox1oXDHkDdPFsYS8PONAp4FWdwBmtA/exec';

      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const estado = document.getElementById('estado');
      const resultado = document.getElementById('resultado');
      const nombreGrande = document.getElementById('nombreGrande');
      const formEnvio = document.getElementById('formEnvio');
      const valorInput = document.getElementById('valorInput');
      const correoInput = document.getElementById('correoInput');

      formEnvio.action = WEBAPP_URL;

      let streamActual = null;
      let escaneando = false;
      let procesando = false;
      let ultimoCodigo = '';
      let ultimoTiempoLectura = 0;

      function setEstado(texto, tipo) {
        estado.textContent = texto;
        if (tipo === 'ok') {
          estado.style.background = '#d1fae5';
          estado.style.color = '#065f46';
        } else if (tipo === 'error') {
          estado.style.background = '#fee2e2';
          estado.style.color = '#991b1b';
        } else {
          estado.style.background = '#dbeafe';
          estado.style.color = '#1e40af';
        }
      }

      function enviarQRAlServidor(valor) {
        valorInput.value = valor;
        correoInput.value = '';
        formEnvio.submit();
      }

      async function iniciarCamara() {
        detenerCamara();
        nombreGrande.textContent = '';
        resultado.textContent = 'Solicitando acceso a la cámara...';
        setEstado('Solicitando acceso a la cámara...', 'info');

        try {
          streamActual = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: 'environment' } },
            audio: false
          });

          video.srcObject = streamActual;
          await video.play();

          escaneando = true;
          procesando = false;
          setEstado('Apunta la cámara al código QR', 'info');
          resultado.textContent = 'Escaneo continuo activo...';

          requestAnimationFrame(leerFrame);
        } catch (error) {
          setEstado('No se pudo abrir la cámara', 'error');
          resultado.textContent = error && error.message ? error.message : String(error);
        }
      }

      function leerFrame() {
        if (!escaneando || procesando) return;

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: 'dontInvert'
          });

          if (code && code.data) {
            const ahora = Date.now();
            const contenido = String(code.data).trim();

            if (contenido === ultimoCodigo && (ahora - ultimoTiempoLectura) < 3000) {
              requestAnimationFrame(leerFrame);
              return;
            }

            ultimoCodigo = contenido;
            ultimoTiempoLectura = ahora;
            procesando = true;
            escaneando = false;

            setEstado('QR detectado, enviando...', 'info');

            const nombreMatch = contenido.match(/[?&]nombre=([^&#]+)/i);
            const idMatch = contenido.match(/[?&]id=([^&#]+)/i);

            const nombre = nombreMatch ? decodeURIComponent(nombreMatch[1]) : '';
            const id = idMatch ? decodeURIComponent(idMatch[1]) : '';

            nombreGrande.textContent = nombre || '';
            resultado.textContent =
              'ID: ' + (id || '') +
              '\nNombre: ' + (nombre || '') +
              '\n\nEnviando al servidor...';

            enviarQRAlServidor(contenido);

            setTimeout(function() {
              setEstado('Enviado. Revisa Asistencia, LecturasQR y Logs.', 'ok');
              resultado.textContent =
                'ID: ' + (id || '') +
                '\nNombre: ' + (nombre || '') +
                '\n\nSe envió al Web App.';
              procesando = false;
              escaneando = true;
              requestAnimationFrame(leerFrame);
            }, 1800);

            return;
          }
        }

        requestAnimationFrame(leerFrame);
      }

      function detenerCamara() {
        escaneando = false;

        if (streamActual) {
          streamActual.getTracks().forEach(track => track.stop());
          streamActual = null;
        }

        video.srcObject = null;
      }

      function reiniciarEscaneo() {
        ultimoCodigo = '';
        ultimoTiempoLectura = 0;
        procesando = false;
        nombreGrande.textContent = '';
        resultado.textContent = 'Reiniciando...';
        iniciarCamara();
      }
    </script>
  </body>
</html>
