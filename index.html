<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia QR</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f3f4f6;
        margin: 0;
        padding: 14px;
        color: #1f2937;
      }

      .contenedor {
        max-width: 480px;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 18px;
        padding: 16px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      }

      h2 {
        margin: 0 0 14px 0;
        text-align: center;
        font-size: 24px;
        color: #111827;
      }

      .panel {
        margin-top: 14px;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 14px;
      }

      .panel-titulo {
        font-size: 14px;
        font-weight: bold;
        color: #374151;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      .controles {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
      }

      select {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 12px;
        font-size: 14px;
        background: #fff;
      }

      .video-wrap {
        position: relative;
        width: 100%;
        max-width: 380px;
        margin: 14px auto 0 auto;
        border-radius: 16px;
        overflow: hidden;
        background: #000;
      }

      #video {
        display: block;
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        background: #000;
      }

      #overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .guia-central {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 62%;
        height: 62%;
        transform: translate(-50%, -50%);
        border: 3px solid rgba(255,255,255,0.9);
        border-radius: 16px;
        box-shadow: 0 0 0 9999px rgba(0,0,0,0.18);
        pointer-events: none;
      }

      #canvas {
        display: none;
      }

      #estado {
        margin-top: 14px;
        font-size: 18px;
        font-weight: bold;
        padding: 12px;
        border-radius: 12px;
        text-align: center;
      }

      #nombreGrande {
        margin-top: 14px;
        font-size: 28px;
        font-weight: bold;
        text-align: center;
        line-height: 1.2;
        min-height: 68px;
        word-break: break-word;
        color: #111827;
      }

      .fila {
        display: grid;
        grid-template-columns: 90px 1fr;
        gap: 8px;
        align-items: start;
        margin-bottom: 10px;
      }

      .fila:last-child {
        margin-bottom: 0;
      }

      .etiqueta {
        font-weight: bold;
        color: #374151;
        font-size: 14px;
      }

      .valor {
        font-size: 14px;
        color: #111827;
        word-break: break-word;
        white-space: pre-line;
      }

      #resultado {
        min-height: 74px;
      }

      #contenidoQR {
        max-height: 120px;
        overflow-y: auto;
        padding: 10px;
        border-radius: 10px;
        background: #ffffff;
        border: 1px solid #d1d5db;
        font-size: 13px;
        line-height: 1.35;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .botones {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 12px 10px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
      }

      .btn-principal {
        background: #1a73e8;
        color: white;
      }

      .btn-secundario {
        background: #e5e7eb;
        color: #111827;
      }

      .ok-bg {
        background: #d1fae5;
        color: #065f46;
      }

      .error-bg {
        background: #fee2e2;
        color: #991b1b;
      }

      .info-bg {
        background: #dbeafe;
        color: #1e40af;
      }

      @media (max-width: 430px) {
        h2 {
          font-size: 21px;
        }

        #nombreGrande {
          font-size: 24px;
        }

        .fila {
          grid-template-columns: 78px 1fr;
        }

        .botones,
        .controles {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="contenedor">
      <h2>Control de asistencia QR</h2>

      <div class="panel">
        <div class="panel-titulo">Cámara</div>
        <div class="controles">
          <select id="cameraSelect">
            <option value="">Cargando cámaras...</option>
          </select>
          <button class="btn-principal" type="button" onclick="aplicarCamaraSeleccionada()">Usar cámara</button>
        </div>
      </div>

      <div class="video-wrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div class="guia-central"></div>
      </div>

      <canvas id="canvas"></canvas>

      <div id="estado" class="info-bg">Selecciona una cámara o activa la predeterminada</div>

      <div id="nombreGrande"></div>

      <div class="panel">
        <div class="panel-titulo">Resultado del registro</div>

        <div class="fila">
          <div class="etiqueta">ID</div>
          <div class="valor" id="idValor">—</div>
        </div>

        <div class="fila">
          <div class="etiqueta">Nombre</div>
          <div class="valor" id="nombreValor">—</div>
        </div>

        <div class="fila">
          <div class="etiqueta">Estado</div>
          <div class="valor" id="resultado">Esperando lectura...</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-titulo">Contenido completo del QR</div>
        <div id="contenidoQR">Sin lectura todavía.</div>
      </div>

      <div class="botones">
        <button class="btn-principal" type="button" onclick="iniciarCamara()">Activar cámara</button>
        <button class="btn-principal" type="button" onclick="reiniciarEscaneo()">Reiniciar</button>
        <button class="btn-secundario" type="button" onclick="detenerCamara()">Detener</button>
        <button class="btn-secundario" type="button" onclick="abrirUltimoQR()">Abrir último QR</button>
      </div>
    </div>

    <iframe name="frameOculto" style="display:none;"></iframe>

    <form id="formEnvio" method="POST" target="frameOculto" style="display:none;">
      <input type="hidden" name="valor" id="valorInput">
      <input type="hidden" name="correo" id="correoInput">
    </form>

    <script>
      const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbyRmeGpINGtq8cGTN94b2MhlbAzc_UziO1e99MzCS1z30ZJSxP4DvInpWM-xArtmrM-QA/exec';

      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');

      const overlay = document.getElementById('overlay');
      const overlayCtx = overlay.getContext('2d');

      const estado = document.getElementById('estado');
      const nombreGrande = document.getElementById('nombreGrande');
      const idValor = document.getElementById('idValor');
      const nombreValor = document.getElementById('nombreValor');
      const resultado = document.getElementById('resultado');
      const contenidoQR = document.getElementById('contenidoQR');

      const formEnvio = document.getElementById('formEnvio');
      const valorInput = document.getElementById('valorInput');
      const correoInput = document.getElementById('correoInput');

      const cameraSelect = document.getElementById('cameraSelect');

      formEnvio.action = WEBAPP_URL;

      let streamActual = null;
      let escaneando = false;
      let procesando = false;
      let ultimoCodigo = '';
      let ultimoTiempoLectura = 0;
      let camaraSeleccionadaId = '';
      let ultimoContenidoDetectado = '';

      function esIOS_() {
        return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      }

      function setEstado(texto, tipo) {
        estado.textContent = texto;
        estado.className = '';

        if (tipo === 'ok') estado.classList.add('ok-bg');
        else if (tipo === 'error') estado.classList.add('error-bg');
        else estado.classList.add('info-bg');
      }

      function beepOk() {
        try {
          const audio = new Audio('https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg');
          audio.play();
        } catch (e) {}
      }

      function beepError() {
        try {
          const audio = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
          audio.play();
        } catch (e) {}
      }

      function vibrar(tipo) {
        if (!navigator.vibrate) return;
        if (tipo === 'ok') navigator.vibrate([120, 60, 120]);
        else navigator.vibrate([200, 80, 200]);
      }

      function limpiarPanel() {
        nombreGrande.textContent = '';
        idValor.textContent = '—';
        nombreValor.textContent = '—';
        resultado.textContent = 'Esperando lectura...';
        contenidoQR.textContent = 'Sin lectura todavía.';
      }

      function limpiarOverlay() {
        overlayCtx.clearRect(0, 0, overlay.width, overlay.height);
      }

      function ajustarOverlay() {
        const rect = video.getBoundingClientRect();
        overlay.width = rect.width;
        overlay.height = rect.height;
        limpiarOverlay();
      }

      function dibujarLinea(inicio, fin, color, ancho) {
        overlayCtx.beginPath();
        overlayCtx.moveTo(inicio.x, inicio.y);
        overlayCtx.lineTo(fin.x, fin.y);
        overlayCtx.lineWidth = ancho;
        overlayCtx.strokeStyle = color;
        overlayCtx.stroke();
      }

      function dibujarMarcoQR(location) {
        limpiarOverlay();

        if (!location) return;

        const sx = overlay.width / canvas.width;
        const sy = overlay.height / canvas.height;

        const topLeft = { x: location.topLeftCorner.x * sx, y: location.topLeftCorner.y * sy };
        const topRight = { x: location.topRightCorner.x * sx, y: location.topRightCorner.y * sy };
        const bottomRight = { x: location.bottomRightCorner.x * sx, y: location.bottomRightCorner.y * sy };
        const bottomLeft = { x: location.bottomLeftCorner.x * sx, y: location.bottomLeftCorner.y * sy };

        dibujarLinea(topLeft, topRight, '#22c55e', 4);
        dibujarLinea(topRight, bottomRight, '#22c55e', 4);
        dibujarLinea(bottomRight, bottomLeft, '#22c55e', 4);
        dibujarLinea(bottomLeft, topLeft, '#22c55e', 4);
      }

      function enviarQRAlServidor(valor) {
        valorInput.value = valor;
        correoInput.value = '';
        formEnvio.submit();
      }

      function abrirUltimoQR() {
        if (!ultimoContenidoDetectado) {
          setEstado('No hay QR leído todavía', 'error');
          return;
        }

        if (/^https?:\/\//i.test(ultimoContenidoDetectado)) {
          window.open(ultimoContenidoDetectado, '_self');
        } else {
          setEstado('El último QR no contiene una URL válida', 'error');
        }
      }

      async function cargarCamaras() {
        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.enumerateDevices) {
            cameraSelect.innerHTML = '<option value="">Tu navegador no soporta cámaras</option>';
            return;
          }

          const devices = await navigator.mediaDevices.enumerateDevices();
          const cameras = devices.filter(device => device.kind === 'videoinput');

          cameraSelect.innerHTML = '';

          if (!cameras.length) {
            cameraSelect.innerHTML = '<option value="">No se encontraron cámaras</option>';
            return;
          }

          cameras.forEach((camera, index) => {
            const option = document.createElement('option');
            option.value = camera.deviceId;
            option.textContent = camera.label || ('Cámara ' + (index + 1));
            cameraSelect.appendChild(option);
          });

          const preferida = cameras.find(cam => /back|rear|trasera|environment/i.test(cam.label || ''));
          camaraSeleccionadaId = preferida ? preferida.deviceId : cameras[0].deviceId;
          cameraSelect.value = camaraSeleccionadaId;

        } catch (error) {
          cameraSelect.innerHTML = '<option value="">Error cargando cámaras</option>';
        }
      }

      async function aplicarCamaraSeleccionada() {
        camaraSeleccionadaId = cameraSelect.value || '';
        await iniciarCamara();
      }

      async function iniciarCamara() {
        detenerCamara();
        limpiarPanel();
        setEstado('Solicitando acceso a la cámara...', 'info');

        try {
          if (!window.isSecureContext) {
            throw new Error('La página no está en contexto seguro HTTPS.');
          }

          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error('Este navegador no soporta getUserMedia().');
          }

          const constraints = camaraSeleccionadaId
            ? {
                video: {
                  deviceId: { exact: camaraSeleccionadaId },
                  width: { ideal: 1280 },
                  height: { ideal: 1280 }
                },
                audio: false
              }
            : {
                video: {
                  width: { ideal: 1280 },
                  height: { ideal: 1280 }
                },
                audio: false
              };

          streamActual = await navigator.mediaDevices.getUserMedia(constraints);

          video.srcObject = streamActual;
          await video.play();

          ajustarOverlay();
          await cargarCamaras();

          escaneando = true;
          procesando = false;

          setEstado('Apunta el QR dentro del recuadro', 'info');
          resultado.textContent = 'Escaneo continuo activo...';

          requestAnimationFrame(leerFrame);
        } catch (error) {
          setEstado('No se pudo abrir la cámara', 'error');
          resultado.textContent = error && error.message ? error.message : String(error);
          beepError();
          vibrar('error');
        }
      }

      function leerFrame() {
        if (!escaneando || procesando) return;

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;

          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const code = jsQR(imageData.data, imageData.width, imageData.height, {
            inversionAttempts: 'dontInvert'
          });

          if (code && code.data) {
            dibujarMarcoQR(code.location);

            const ahora = Date.now();
            const contenido = String(code.data).trim();
            ultimoContenidoDetectado = contenido;

            if (contenido === ultimoCodigo && (ahora - ultimoTiempoLectura) < 3000) {
              requestAnimationFrame(leerFrame);
              return;
            }

            ultimoCodigo = contenido;
            ultimoTiempoLectura = ahora;
            procesando = true;
            escaneando = false;

            setEstado('QR detectado, procesando...', 'info');
            contenidoQR.textContent = contenido;

            let nombre = '';
            let id = '';

            try {
              const url = new URL(contenido);
              nombre = url.searchParams.get('nombre') || '';
              id = url.searchParams.get('id') || '';
            } catch (e) {
              const nombreMatch = contenido.match(/[?&]nombre=([^&#]+)/i);
              const idMatch = contenido.match(/[?&]id=([^&#]+)/i);

              nombre = nombreMatch ? decodeURIComponent(nombreMatch[1]) : '';
              id = idMatch ? decodeURIComponent(idMatch[1]) : '';
            }

            idValor.textContent = id || '—';
            nombreValor.textContent = nombre || '—';
            nombreGrande.textContent = nombre || '';

            if (esIOS_() && /^https?:\/\//i.test(contenido)) {
              resultado.textContent = 'Abriendo registro en iPhone/iPad...';
              setEstado('Abriendo registro en iPhone/iPad...', 'info');
              beepOk();
              vibrar('ok');
              detenerCamara();

              setTimeout(function() {
                window.open(contenido, '_self');
              }, 400);

              return;
            }

            resultado.textContent = 'Enviando al servidor...';
            enviarQRAlServidor(contenido);

            setTimeout(function() {
              setEstado('Enviado correctamente', 'ok');
              resultado.textContent = 'Se envió al Web App. Revisa Asistencia, LecturasQR y Logs.';
              beepOk();
              vibrar('ok');

              procesando = false;
              escaneando = true;
              limpiarOverlay();
              requestAnimationFrame(leerFrame);
            }, 1800);

            return;
          } else {
            limpiarOverlay();
          }
        }

        requestAnimationFrame(leerFrame);
      }

      function detenerCamara() {
        escaneando = false;

        if (streamActual) {
          streamActual.getTracks().forEach(function(track) {
            track.stop();
          });
          streamActual = null;
        }

        video.srcObject = null;
        limpiarOverlay();
        setEstado('Cámara detenida', 'info');
      }

      function reiniciarEscaneo() {
        ultimoCodigo = '';
        ultimoTiempoLectura = 0;
        procesando = false;
        limpiarPanel();
        setEstado('Reiniciando...', 'info');
        iniciarCamara();
      }

      window.addEventListener('resize', ajustarOverlay);

      window.onload = async function() {
        await cargarCamaras();
      };

      window.onbeforeunload = function() {
        detenerCamara();
      };
    </script>
  </body>
</html>
